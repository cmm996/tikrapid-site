services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tikrapid
      POSTGRES_PASSWORD: tikrapid_password
      POSTGRES_DB: tikrapid_customer_center
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tikrapid -d tikrapid_customer_center"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://tikrapid:tikrapid_password@db:5432/tikrapid_customer_center?schema=public
      AUTH_SECRET: replace-with-a-long-random-secret
      ADMIN_EMAIL: admin@tikrapid.local
      ADMIN_PASSWORD: ChangeMe123!
      UPLOAD_DIR: /app/uploads
    volumes:
      - upload_data:/app/uploads
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  upload_data:
