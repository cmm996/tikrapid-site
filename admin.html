<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>工单后台 - tikrapid</title>
<style>
body{margin:0;background:#060816;color:#fff;font-family:Inter,Arial,sans-serif;padding:30px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
h1{margin:0;font-size:32px}
button,input,select{border:1px solid rgba(255,255,255,.12);background:#0f172a;color:#fff;border-radius:10px;padding:10px 12px}
button{cursor:pointer;background:linear-gradient(135deg,#2563eb,#7c3aed);font-weight:700}
.card{background:rgba(15,23,42,.85);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:20px}
.toolbar{display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap}
table{width:100%;border-collapse:collapse}
th,td{padding:13px;border-bottom:1px solid rgba(255,255,255,.08);text-align:left;font-size:14px}
th{color:#93c5fd}
.status{padding:4px 8px;border-radius:999px;background:rgba(34,197,94,.15);color:#86efac;font-weight:700}
.empty{color:#94a3b8;text-align:center;padding:30px}
</style>
</head>
<body>

<div class="header">
  <h1>工单后台</h1>
  <button onclick="loadTickets()">刷新工单</button>
</div>

<div class="card">
  <div class="toolbar">
    <input id="search" placeholder="搜索微信号 / 地区 / 内容">
    <select id="status">
      <option value="">全部状态</option>
      <option value="open">open</option>
      <option value="closed">closed</option>
    </select>
    <button onclick="loadTickets()">搜索</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>微信</th>
        <th>类型</th>
        <th>地区</th>
        <th>内容</th>
        <th>状态</th>
        <th>时间</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="ticketBody">
      <tr><td colspan="8" class="empty">加载中...</td></tr>
    </tbody>
  </table>
</div>

<script>
async function loadTickets(){
  const q = document.getElementById("search").value.trim();
  const status = document.getElementById("status").value;

  const url = new URL("/api/admin/tickets", location.origin);
  if(q) url.searchParams.set("q", q);
  if(status) url.searchParams.set("status", status);

  const res = await fetch(url);
  const data = await res.json();

  const body = document.getElementById("ticketBody");
  body.innerHTML = "";

  if(!data.tickets || data.tickets.length === 0){
    body.innerHTML = '<tr><td colspan="7" class="empty">暂无工单</td></tr>';
    return;
  }

  data.tickets.forEach(t=>{
    body.innerHTML += `
      <tr>
        <td>${t.id}</td>
        <td>${escapeHtml(t.wechat)}</td>
        <td>${escapeHtml(t.type)}</td>
        <td>${escapeHtml(t.region || "-")}</td>
        <td>${escapeHtml(t.message)}</td>
        <td><span class="status">${escapeHtml(t.status)}</span></td>
        <td>${escapeHtml(t.created_at)}</td>
        <td>
  <button onclick="updateTicket(${t.id}, 'close')">已处理</button>
  <button onclick="updateTicket(${t.id}, 'open')">重新打开</button>
  <button onclick="updateTicket(${t.id}, 'delete')">删除</button>
</td>
      </tr>
    `;
  });
}

function escapeHtml(str){
  return String(str ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

loadTickets();
  async function updateTicket(id, action) {
  if (action === "delete" && !confirm("确定删除这个工单吗？")) return;

  const res = await fetch("/api/admin/ticket", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ id, action })
  });

  if (res.ok) {
    loadTickets();
  } else {
    alert("操作失败");
  }
}
</script>

</body>
</html>
